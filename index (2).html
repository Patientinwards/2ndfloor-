<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ward 2 · 2nd Floor — Bed Tracker</title>
<style>
:root{
  --bg:#f5f6f8;
  --panel:#ffffff;
  --panel2:#f0f2f5;
  --line:#dde1e6;
  --text:#1a2530;
  --dim:#6b7684;
  --accent:#0f9c8d;
  --accent-dim:#e1f5f2;
  --stable:#0f9c8d;
  --program:#5b7cd9;
  --postop:#c9861a;
  --empty:#c7ccd3;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{
  background:var(--bg);
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  min-height:100vh;
  padding-bottom:60px;
}
header{
  background:var(--panel);
  border-bottom:1px solid var(--line);
  padding:16px 20px;
  position:sticky;
  top:0;
  z-index:10;
}
.header-top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  flex-wrap:wrap;
  gap:10px;
}
h1{
  font-size:18px;
  font-weight:700;
  letter-spacing:0.3px;
}
h1 span{color:var(--accent);}
#dateDisplay{color:var(--dim);font-size:13px;margin-top:2px;}
.stats{
  display:flex;
  gap:14px;
  flex-wrap:wrap;
}
.stat{
  background:var(--panel2);
  border:1px solid var(--line);
  border-radius:8px;
  padding:8px 14px;
  text-align:center;
  min-width:64px;
}
.stat .num{font-size:20px;font-weight:700;}
.stat .lbl{font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:0.5px;}
.stat.occ .num{color:var(--accent);}
.stat.program .num{color:var(--program);}
.stat.postop .num{color:var(--postop);}

.toolbar{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  margin-top:12px;
}
button{
  background:var(--panel2);
  color:var(--text);
  border:1px solid var(--line);
  border-radius:7px;
  padding:9px 14px;
  font-size:13px;
  cursor:pointer;
  transition:0.15s;
}
button:hover{border-color:var(--accent);color:var(--accent);}
button.primary{
  background:var(--accent-dim);
  border-color:var(--accent);
  color:var(--accent);
}
button.primary:hover{background:var(--accent);color:#06110f;}
button.danger:hover{border-color:#d64545;color:#d64545;}

main{padding:20px;max-width:1200px;margin:0 auto;}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
  gap:12px;
  margin-top:16px;
}
.bed{
  background:var(--panel);
  border:1px solid var(--line);
  border-radius:10px;
  padding:12px;
  cursor:pointer;
  min-height:110px;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  transition:0.15s;
  position:relative;
  border-left:4px solid var(--empty);
}
.bed:hover{transform:translateY(-2px);border-color:var(--accent);}
.bed.occupied{border-left-color:var(--stable);}
.bed.program{border-left-color:var(--program);}
.bed.postop{border-left-color:var(--postop);}
.bed-num{font-size:12px;color:var(--dim);font-weight:600;letter-spacing:0.5px;}
.bed-name{font-size:14px;font-weight:600;margin-top:6px;line-height:1.3;}
.bed-meta{font-size:11px;color:var(--dim);margin-top:4px;}
.bed-dx{font-size:11px;color:var(--text);margin-top:6px;line-height:1.3;opacity:0.85;}
.bed-empty-label{color:var(--dim);font-size:13px;margin-top:auto;}
.link-btn{
  margin-top:8px;
  align-self:flex-start;
  background:var(--accent-dim);
  color:var(--accent);
  border:1px solid var(--accent);
  border-radius:6px;
  padding:4px 8px;
  font-size:11px;
  cursor:pointer;
}
.link-btn:hover{background:var(--accent);color:#fff;}
.status-dot{
  width:8px;height:8px;border-radius:50%;
  position:absolute;top:12px;right:12px;
  background:var(--empty);
}
.bed.occupied .status-dot{background:var(--stable);}
.bed.program .status-dot{background:var(--program);}
.bed.postop .status-dot{background:var(--postop);}

/* Modal */
.overlay{
  display:none;
  position:fixed;inset:0;
  background:rgba(0,0,0,0.6);
  z-index:100;
  align-items:center;justify-content:center;
  padding:16px;
}
.overlay.show{display:flex;}
.modal{
  background:var(--panel);
  border:1px solid var(--line);
  border-radius:12px;
  width:100%;
  max-width:460px;
  max-height:90vh;
  overflow-y:auto;
  padding:20px;
}
.modal h2{font-size:16px;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center;}
.modal h2 .close{cursor:pointer;color:var(--dim);font-size:20px;}
.field{margin-bottom:12px;}
.field label{font-size:11px;color:var(--dim);text-transform:uppercase;letter-spacing:0.4px;display:block;margin-bottom:5px;}
.field input,.field select,.field textarea{
  width:100%;
  background:var(--panel2);
  border:1px solid var(--line);
  border-radius:7px;
  padding:9px 10px;
  color:var(--text);
  font-size:14px;
  font-family:inherit;
}
.field textarea{resize:vertical;min-height:60px;}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.modal-actions{display:flex;gap:8px;margin-top:16px;}
.modal-actions button{flex:1;}

/* Report panel */
.report-panel{
  margin-top:28px;
  background:var(--panel);
  border:1px solid var(--line);
  border-radius:10px;
  padding:18px;
}
.report-panel h2{font-size:15px;margin-bottom:12px;color:var(--accent);}
#reportOutput{
  width:100%;
  min-height:260px;
  background:var(--panel2);
  border:1px solid var(--line);
  border-radius:8px;
  padding:14px;
  color:var(--text);
  font-family:'SF Mono',Consolas,monospace;
  font-size:12.5px;
  line-height:1.6;
  white-space:pre-wrap;
}
.report-actions{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap;}

.empty-state{
  text-align:center;color:var(--dim);padding:40px 20px;font-size:13px;
}
footer{
  text-align:center;color:var(--dim);font-size:11px;padding:20px;
}
@media print{
  header,.toolbar,.grid,footer,.report-actions{display:none!important;}
  .report-panel{border:none;padding:0;}
  #reportOutput{border:none;background:none;color:#000;}
  body{background:#fff;color:#000;}
}
</style>
</head>
<body>

<header>
  <div class="header-top">
    <div>
      <h1>Ward 2 <span>· 2nd Floor</span> — Bed Tracker</h1>
      <div id="dateDisplay"></div>
      <div id="saveStatus" style="color:var(--dim);font-size:11px;margin-top:2px;"></div>
    </div>
    <div class="stats">
      <div class="stat"><div class="num" id="statTotal">0</div><div class="lbl">Beds</div></div>
      <div class="stat occ"><div class="num" id="statOcc">0</div><div class="lbl">Occupied</div></div>
      <div class="stat"><div class="num" id="statEmpty">0</div><div class="lbl">Empty</div></div>
      <div class="stat program"><div class="num" id="statProgram">0</div><div class="lbl">Program</div></div>
      <div class="stat postop"><div class="num" id="statPostop">0</div><div class="lbl">Post-op</div></div>
    </div>
  </div>
  <div class="toolbar">
    <button class="primary" onclick="addBed()">+ Add Bed</button>
    <button onclick="generateReport()">Generate Report</button>
    <button onclick="exportData()">Export JSON</button>
    <button onclick="document.getElementById('importFile').click()">Import JSON</button>
    <input type="file" id="importFile" accept=".json" style="display:none" onchange="importData(event)">
    <button class="danger" onclick="resetAll()">Clear All</button>
  </div>
</header>

<main>
  <div class="grid" id="bedGrid"></div>

  <div class="report-panel">
    <h2>Daily Report</h2>
    <div id="reportOutput">Click "Generate Report" to compile the current census and patient list.</div>
    <div class="report-actions">
      <button class="primary" onclick="copyReport()">Copy Report</button>
      <button onclick="window.print()">Print</button>
    </div>
  </div>
</main>

<footer>Offline tool · Data is kept in memory only — use Export JSON before closing the tab to save your work.</footer>

<!-- Modal -->
<div class="overlay" id="modalOverlay">
  <div class="modal">
    <h2><span id="modalTitle">Bed</span><span class="close" onclick="closeModal()">&times;</span></h2>
    <div class="field">
      <label>Bed / Room Number</label>
      <input type="text" id="fBedNum" placeholder="e.g. 201">
    </div>
    <div class="row2">
      <div class="field">
        <label>Patient Name</label>
        <input type="text" id="fName" placeholder="Full name">
      </div>
      <div class="field">
        <label>Age / Sex</label>
        <input type="text" id="fAgeSex" placeholder="e.g. 45 / F">
      </div>
    </div>
    <div class="row2">
      <div class="field">
        <label>HN / Patient ID</label>
        <input type="text" id="fHN" placeholder="Hospital number">
      </div>
      <div class="field">
        <label>Admission Date</label>
        <input type="date" id="fAdmit">
      </div>
    </div>
    <div class="field">
      <label>Diagnosis</label>
      <input type="text" id="fDx" placeholder="Working diagnosis">
    </div>
    <div class="row2">
      <div class="field">
        <label>Attending Doctor</label>
        <input type="text" id="fDoctor" placeholder="Dr. name">
      </div>
      <div class="field">
        <label>Status</label>
        <select id="fStatus">
          <option value="program">Program</option>
          <option value="postop">Post-op</option>
        </select>
      </div>
    </div>
    <div class="field">
      <label>Notes</label>
      <textarea id="fNotes" placeholder="Plan, follow-up, pending results..."></textarea>
    </div>
    <div class="field">
      <label>Direct Link (chart, JotForm, imaging, etc.)</label>
      <input type="url" id="fLink" placeholder="https://...">
    </div>
    <div class="modal-actions">
      <button class="danger" onclick="dischargeBed()" id="dischargeBtn">Discharge / Clear</button>
      <button class="primary" onclick="saveBed()">Save</button>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script>
const firebaseConfig = {
  apiKey: "AIzaSyCuUg5q-cFNb9YfqU2wI57yi1L5elLEOlo",
  authDomain: "ndfloor-833ce.firebaseapp.com",
  projectId: "ndfloor-833ce",
  storageBucket: "ndfloor-833ce.firebasestorage.app",
  messagingSenderId: "531702970818",
  appId: "1:531702970818:web:98297aa632f37e2562be5b"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
db.enablePersistence({synchronizeTabs:true}).catch(()=>{ /* offline cache unavailable in this browser, Firestore still works online */ });
const WARD_DOC = db.collection('wards').doc('ward2');
</script>
<script>
let beds = [];
let currentBedIndex = null;

const STORAGE_KEY = 'ward2_bed_tracker_data';

async function initDefaultBeds(){
  try{
    const snap = await WARD_DOC.get();
    if(snap.exists && Array.isArray(snap.data().beds) && snap.data().beds.length){
      beds = snap.data().beds;
      render();
      return;
    }
  }catch(e){
    console.warn('Firestore load failed, using defaults', e);
  }
  const rooms = ['201','202','203','204','205','206','207','208','209','210','211','212'];
  beds = rooms.map(r => ({ num:r, occupied:false, name:'', ageSex:'', hn:'', admit:'', dx:'', doctor:'', status:'program', notes:'', link:'' }));
  render();
}

function saveToStorage(){
  const el = document.getElementById('saveStatus');
  WARD_DOC.set({ beds, savedAt: new Date().toISOString() })
    .then(()=>{
      if(el){
        const t = new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});
        el.textContent = 'Saved online · ' + t;
      }
    })
    .catch(()=>{
      if(el) el.textContent = 'Saved offline (will sync when online)';
    });
}

function updateDate(){
  const now = new Date();
  document.getElementById('dateDisplay').textContent = now.toLocaleDateString('en-US', {weekday:'long', year:'numeric', month:'long', day:'numeric'}) + ' · ' + now.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});
}

function render(){
  saveToStorage();
  const grid = document.getElementById('bedGrid');
  grid.innerHTML = '';
  if(beds.length === 0){
    grid.innerHTML = '<div class="empty-state">No beds yet. Click "+ Add Bed" to start.</div>';
  }
  beds.forEach((b, i) => {
    const div = document.createElement('div');
    let cls = 'bed';
    if(b.occupied){
      cls += b.status === 'postop' ? ' postop' : ' program';
    }
    div.className = cls;
    div.onclick = () => openModal(i);
    if(b.occupied){
      div.innerHTML = `
        <div class="status-dot"></div>
        <div class="bed-num">${escapeHtml(b.num)}</div>
        <div class="bed-name">${escapeHtml(b.name || '(no name)')}</div>
        <div class="bed-meta">${escapeHtml(b.ageSex || '')}${b.hn ? ' · HN '+escapeHtml(b.hn) : ''}</div>
        <div class="bed-dx">${escapeHtml(b.dx || '')}</div>
        ${b.link ? `<button class="link-btn" onclick="event.stopPropagation(); window.open('${escapeAttr(b.link)}','_blank')">Open Link ↗</button>` : ''}
      `;
    } else {
      div.innerHTML = `
        <div class="status-dot"></div>
        <div class="bed-num">${escapeHtml(b.num)}</div>
        <div class="bed-empty-label">Empty — tap to admit</div>
      `;
    }
    grid.appendChild(div);
  });
  updateStats();
}

function updateStats(){
  const total = beds.length;
  const occ = beds.filter(b=>b.occupied).length;
  const program = beds.filter(b=>b.occupied && b.status==='program').length;
  const postop = beds.filter(b=>b.occupied && b.status==='postop').length;
  document.getElementById('statTotal').textContent = total;
  document.getElementById('statOcc').textContent = occ;
  document.getElementById('statEmpty').textContent = total - occ;
  document.getElementById('statProgram').textContent = program;
  document.getElementById('statPostop').textContent = postop;
}

function escapeHtml(s){
  const d = document.createElement('div');
  d.textContent = s || '';
  return d.innerHTML;
}

function escapeAttr(s){
  return (s || '').replace(/'/g, '%27').replace(/"/g, '%22');
}

function addBed(){
  const num = prompt('New bed / room number:');
  if(!num) return;
  beds.push({ num, occupied:false, name:'', ageSex:'', hn:'', admit:'', dx:'', doctor:'', status:'program', notes:'', link:'' });
  render();
}

function openModal(i){
  currentBedIndex = i;
  const b = beds[i];
  document.getElementById('modalTitle').textContent = 'Bed ' + b.num;
  document.getElementById('fBedNum').value = b.num;
  document.getElementById('fName').value = b.name;
  document.getElementById('fAgeSex').value = b.ageSex;
  document.getElementById('fHN').value = b.hn;
  document.getElementById('fAdmit').value = b.admit;
  document.getElementById('fDx').value = b.dx;
  document.getElementById('fDoctor').value = b.doctor;
  document.getElementById('fStatus').value = b.status || 'program';
  document.getElementById('fNotes').value = b.notes;
  document.getElementById('fLink').value = b.link || '';
  document.getElementById('dischargeBtn').style.display = b.occupied ? 'block' : 'none';
  document.getElementById('modalOverlay').classList.add('show');
}

function closeModal(){
  document.getElementById('modalOverlay').classList.remove('show');
  currentBedIndex = null;
}

function saveBed(){
  if(currentBedIndex === null) return;
  const b = beds[currentBedIndex];
  b.num = document.getElementById('fBedNum').value || b.num;
  b.name = document.getElementById('fName').value;
  b.ageSex = document.getElementById('fAgeSex').value;
  b.hn = document.getElementById('fHN').value;
  b.admit = document.getElementById('fAdmit').value;
  b.dx = document.getElementById('fDx').value;
  b.doctor = document.getElementById('fDoctor').value;
  b.status = document.getElementById('fStatus').value;
  b.notes = document.getElementById('fNotes').value;
  b.link = document.getElementById('fLink').value;
  b.occupied = !!(b.name || b.dx || b.hn);
  closeModal();
  render();
}

function dischargeBed(){
  if(currentBedIndex === null) return;
  const b = beds[currentBedIndex];
  const num = b.num;
  Object.assign(b, { num, occupied:false, name:'', ageSex:'', hn:'', admit:'', dx:'', doctor:'', status:'program', notes:'', link:'' });
  closeModal();
  render();
}

function resetAll(){
  if(!confirm('Clear ALL bed and patient data? This cannot be undone unless you exported it.')) return;
  beds.forEach(b => Object.assign(b, { occupied:false, name:'', ageSex:'', hn:'', admit:'', dx:'', doctor:'', status:'program', notes:'', link:'' }));
  render();
}

function generateReport(){
  const now = new Date();
  const dateStr = now.toLocaleDateString('en-US', {weekday:'long', year:'numeric', month:'long', day:'numeric'});
  const occ = beds.filter(b=>b.occupied);
  const empty = beds.filter(b=>!b.occupied);
  const program = occ.filter(b=>b.status==='program');
  const postop = occ.filter(b=>b.status==='postop');

  let r = '';
  r += 'WARD 2 — 2ND FLOOR DAILY REPORT\n';
  r += dateStr + '\n';
  r += '='.repeat(40) + '\n\n';
  r += `CENSUS: ${beds.length} beds | ${occ.length} occupied | ${empty.length} empty\n`;
  r += `Program: ${program.length}   Post-op: ${postop.length}\n\n`;

  if(program.length){
    r += '--- PROGRAM ---\n';
    program.forEach(b => r += formatPatientLine(b));
    r += '\n';
  }
  if(postop.length){
    r += '--- POST-OP ---\n';
    postop.forEach(b => r += formatPatientLine(b));
    r += '\n';
  }
  if(empty.length){
    r += '--- EMPTY BEDS ---\n';
    r += empty.map(b=>b.num).join(', ') + '\n\n';
  }
  r += '='.repeat(40) + '\n';
  r += 'Report generated ' + now.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});

  document.getElementById('reportOutput').textContent = r;
}

function formatPatientLine(b){
  let line = `Bed ${b.num}: ${b.name || '(no name)'}`;
  if(b.ageSex) line += ` (${b.ageSex})`;
  if(b.hn) line += ` — HN ${b.hn}`;
  line += '\n';
  if(b.dx) line += `   Dx: ${b.dx}\n`;
  if(b.doctor) line += `   Dr: ${b.doctor}\n`;
  if(b.admit) line += `   Admitted: ${b.admit}\n`;
  if(b.notes) line += `   Notes: ${b.notes}\n`;
  return line;
}

function copyReport(){
  const text = document.getElementById('reportOutput').textContent;
  navigator.clipboard.writeText(text).then(()=>{
    alert('Report copied to clipboard.');
  }).catch(()=>{
    alert('Could not copy automatically — please select and copy the text manually.');
  });
}

function exportData(){
  const blob = new Blob([JSON.stringify({beds, exportedAt: new Date().toISOString()}, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const now = new Date();
  const stamp = now.toISOString().slice(0,10);
  a.href = url;
  a.download = `ward2_beds_${stamp}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function importData(event){
  const file = event.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try{
      const data = JSON.parse(e.target.result);
      if(Array.isArray(data.beds)){
        beds = data.beds;
        render();
        alert('Data imported successfully.');
      } else {
        alert('Invalid file format.');
      }
    }catch(err){
      alert('Could not read file: ' + err.message);
    }
  };
  reader.readAsText(file);
  event.target.value = '';
}

updateDate();
setInterval(updateDate, 60000);
initDefaultBeds();
</script>

</body>
</html>
